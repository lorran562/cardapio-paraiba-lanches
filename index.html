<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Braseiro Artesanal — Cardápio</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --brand:#C8181A;--brand2:#FF4D00;--gold:#D4A017;
  --bg:#0A0A0A;--card:#161616;--card2:#1E1E1E;
  --text:#F5F5F5;--muted:rgba(255,255,255,0.42);--border:rgba(255,255,255,0.07);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%;background:var(--bg);font-family:'Barlow',sans-serif;color:var(--text);max-width:480px;margin:0 auto}
body{display:flex;flex-direction:column;padding-bottom:90px}

/* LOADING */
#loading{
  position:fixed;inset:0;background:var(--bg);z-index:999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
}
.spin{width:42px;height:42px;border:3px solid rgba(200,24,26,.2);border-top-color:var(--brand);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* HEADER */
#header{
  position:sticky;top:0;z-index:40;
  padding:max(env(safe-area-inset-top,0px),12px) 16px 10px;
  background:linear-gradient(180deg,#0A0A0A 85%,transparent);
}
.h-brand{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.h-logo-wrap{
  width:44px;height:44px;border-radius:50%;
  background:var(--brand);
  display:flex;align-items:center;justify-content:center;
  font-size:22px;flex-shrink:0;
  box-shadow:0 0 0 2px rgba(200,24,26,.3);
}
.h-name{font-family:'Bebas Neue';font-size:22px;letter-spacing:1.5px;color:var(--text);line-height:1}
.h-sub{font-size:10px;color:var(--muted);margin-top:2px}
.h-mesa{
  margin-left:auto;flex-shrink:0;
  background:#1A1A1A;border:1px solid rgba(255,255,255,0.08);
  border-radius:10px;padding:5px 10px;text-align:center;
}
.h-mesa span:first-child{display:block;font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.h-mesa span:last-child{font-family:'Bebas Neue';font-size:17px;color:var(--gold)}
#cats{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
#cats::-webkit-scrollbar{display:none}
.cat-btn{
  flex-shrink:0;border:1px solid rgba(255,255,255,.08);border-radius:20px;
  padding:5px 13px;font:700 11px/1 'Barlow';
  background:rgba(255,255,255,.05);color:rgba(255,255,255,.5);
  cursor:pointer;transition:all .15s;
}
.cat-btn.active{background:var(--brand);color:#fff;border-color:var(--brand)}

/* SCREEN */
#screen{flex:1;overflow-y:auto;padding-bottom:4px}
#screen::-webkit-scrollbar{display:none}
.sec-head{
  display:flex;align-items:center;gap:8px;
  padding:14px 16px 8px;
}
.sec-head-line{flex:1;height:1px;background:rgba(255,255,255,.06)}
.sec-head-title{font-family:'Bebas Neue';font-size:16px;color:rgba(255,255,255,.35);letter-spacing:2px}

/* CARD */
.p-card{
  margin:0 16px 10px;
  background:var(--card);border-radius:16px;
  border:1.5px solid var(--border);overflow:hidden;
  display:flex;gap:0;transition:border-color .2s;
}
.p-card.in-cart{border-color:rgba(200,24,26,.35)}
.p-left{
  flex:1;padding:14px 14px 12px;min-width:0;
}
.p-name{font-family:'Bebas Neue';font-size:17px;letter-spacing:.5px;line-height:1.1;margin-bottom:4px}
.p-desc{font-size:11px;color:var(--muted);line-height:1.5;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.p-bottom{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.p-price-wrap{}
.p-price-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.p-price{font-family:'Bebas Neue';font-size:22px;color:var(--brand);line-height:1}
.p-price small{font-family:'Barlow';font-size:10px;color:var(--muted);vertical-align:middle}
.p-right{
  width:100px;flex-shrink:0;
  background:radial-gradient(circle at 40% 40%,#2a0a0a,#0d0d0d);
  display:flex;align-items:center;justify-content:center;
  font-size:62px;position:relative;
}
.p-badge{
  position:absolute;top:7px;left:-1px;
  background:var(--gold);color:#000;
  font-size:8px;font-weight:800;letter-spacing:.5px;
  padding:2px 7px;border-radius:0 4px 4px 0;
  text-transform:uppercase;
}
.p-qty-chip{
  position:absolute;top:7px;right:7px;
  width:22px;height:22px;border-radius:50%;
  background:var(--brand);color:#fff;
  font-size:11px;font-weight:800;
  display:none;align-items:center;justify-content:center;
}
.p-card.in-cart .p-qty-chip{display:flex}

/* BTN ADD / QTY */
.btn-add{
  background:var(--brand);color:#fff;border:none;border-radius:10px;
  padding:7px 13px;font:800 11px 'Barlow';cursor:pointer;
  box-shadow:0 3px 12px rgba(200,24,26,.35);transition:transform .1s;white-space:nowrap;
}
.btn-add:active{transform:scale(.92)}
.qty-ctrl{display:flex;align-items:center;gap:6px}
.qty-btn{
  width:28px;height:28px;border-radius:8px;border:none;
  cursor:pointer;font-size:16px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
}
.qty-btn.minus{background:rgba(255,255,255,.08);color:#fff}
.qty-btn.plus{background:var(--brand);color:#fff}
.qty-num{font-size:13px;font-weight:800;min-width:13px;text-align:center}

/* VAR TAGS */
.var-tags{margin-top:6px;display:flex;flex-direction:column;gap:3px}
.var-tag{
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(200,24,26,.08);border-radius:6px;padding:3px 8px;
  font-size:10px;color:rgba(255,255,255,.6);font-weight:600;border:1px solid rgba(200,24,26,.15);
}
.var-tag button{background:none;border:none;color:rgba(255,255,255,.3);font-size:12px;cursor:pointer;padding:0 1px;line-height:1}

/* CART BAR */
#cart-bar{
  position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;
  background:#141414;border-top:1px solid var(--border);
  padding:10px 16px max(env(safe-area-inset-bottom,0px),12px);z-index:50;
}
#cart-empty{text-align:center;font-size:12px;color:rgba(255,255,255,.18);padding:5px 0}
#cart-btn{
  display:none;width:100%;padding:13px 18px;border:none;border-radius:14px;
  background:linear-gradient(135deg,var(--brand),var(--brand2));
  align-items:center;justify-content:space-between;cursor:pointer;
  box-shadow:0 6px 24px rgba(200,24,26,.4);transition:transform .15s;
}
#cart-btn.visible{display:flex}
#cart-btn:active{transform:scale(.97)}
.cb-count{
  background:rgba(0,0,0,.2);border-radius:8px;width:28px;height:28px;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:900;color:#fff;
}
.cb-label{font-family:'Bebas Neue';font-size:19px;color:#fff;letter-spacing:2px}
.cb-total{font-family:'Bebas Neue';font-size:18px;color:#fff;letter-spacing:1px}

/* OVERLAYS */
.overlay{
  position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.85);
  display:flex;flex-direction:column;justify-content:flex-end;
  animation:fadeIn .18s ease;
}
.sheet{
  background:#1A1A1A;border-radius:26px 26px 0 0;
  padding:18px 18px max(env(safe-area-inset-bottom,0px),28px);
  max-height:88vh;overflow-y:auto;
  animation:slideUp .25s cubic-bezier(.22,.68,0,1.2);
}
.handle{width:38px;height:4px;background:rgba(255,255,255,.12);border-radius:2px;margin:0 auto 16px}
.sheet-title{font-family:'Bebas Neue';font-size:22px;letter-spacing:1px;margin-bottom:14px}

/* VAR SELECT */
.opt-btn{
  display:flex;align-items:center;justify-content:space-between;
  width:100%;padding:12px 14px;border-radius:12px;margin-bottom:8px;
  background:#252525;border:2px solid transparent;cursor:pointer;transition:all .15s;
}
.opt-btn.sel{background:rgba(200,24,26,.1);border-color:var(--brand)}
.opt-left{display:flex;align-items:center;gap:10px}
.radio{
  width:18px;height:18px;border-radius:50%;border:2px solid rgba(255,255,255,.2);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;
}
.opt-btn.sel .radio{background:var(--brand);border-color:var(--brand)}
.radio-dot{width:7px;height:7px;border-radius:50%;background:#fff;display:none}
.opt-btn.sel .radio-dot{display:block}
.opt-label{font-weight:700;font-size:14px;color:rgba(255,255,255,.7)}
.opt-btn.sel .opt-label{color:#fff}
.opt-price{font-family:'Bebas Neue';font-size:18px;color:rgba(255,255,255,.35)}
.opt-btn.sel .opt-price{color:var(--brand)}

/* CONFIRM BTN */
#var-confirm{
  width:100%;padding:14px;border:none;border-radius:14px;margin-top:4px;
  font-family:'Bebas Neue';font-size:20px;letter-spacing:2px;cursor:pointer;transition:all .15s;
}

/* ORDER ITEMS */
.order-item{
  display:flex;align-items:flex-start;gap:10px;
  padding-bottom:12px;margin-bottom:12px;
  border-bottom:1px solid rgba(255,255,255,.06);
}
.oi-emoji{font-size:26px;flex-shrink:0}
.oi-name{font-size:13px;font-weight:700}
.oi-var{
  display:inline-block;margin-top:3px;
  font-size:10px;font-weight:700;color:var(--brand);
  background:rgba(200,24,26,.1);border-radius:4px;padding:1px 6px;
}
.oi-price{font-size:12px;color:var(--muted);margin-top:3px}
.oi-right{margin-left:auto;flex-shrink:0}
.oi-total{font-family:'Bebas Neue';font-size:18px;color:var(--brand)}
.order-total-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:14px 0;border-top:1px solid rgba(255,255,255,.1);margin-bottom:16px;
}
.otl{font-size:14px;font-weight:700;color:rgba(255,255,255,.45)}
.otv{font-family:'Bebas Neue';font-size:30px;color:var(--brand)}
.btn-finalizar{
  width:100%;padding:16px;border:none;border-radius:16px;
  background:linear-gradient(135deg,var(--brand),var(--brand2));
  font-family:'Bebas Neue';font-size:22px;letter-spacing:2px;color:#fff;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;
  box-shadow:0 6px 24px rgba(200,24,26,.4);
}
.btn-back{
  width:100%;padding:10px;border:none;background:transparent;
  font:600 13px 'Barlow';color:rgba(255,255,255,.28);cursor:pointer;margin-top:4px;
}

/* SUCCESS */
#success-overlay{
  position:fixed;inset:0;z-index:300;
  background:rgba(0,0,0,.95);
  display:none;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:32px;
}
#success-overlay.show{display:flex}
.s-icon{font-size:64px;margin-bottom:16px;animation:bounce .5s ease}
.s-title{font-family:'Bebas Neue';font-size:34px;color:var(--brand);margin-bottom:6px}
.s-sub{font-size:15px;color:var(--muted);margin-bottom:24px;line-height:1.6}
.s-num{font-family:'Bebas Neue';font-size:56px;color:#fff;line-height:1}
.s-numlabel{font-size:12px;color:var(--muted);margin-top:4px;margin-bottom:28px}
.btn-voltar{
  background:var(--brand);color:#fff;border:none;
  padding:14px 36px;border-radius:14px;
  font-family:'Bebas Neue';font-size:20px;letter-spacing:2px;cursor:pointer;
}

/* SAVING INDICATOR */
#saving{
  position:fixed;top:16px;right:16px;z-index:400;
  background:#1A1A1A;border:1px solid rgba(255,255,255,.1);border-radius:10px;
  padding:8px 14px;font-size:12px;font-weight:700;color:var(--muted);
  display:none;align-items:center;gap:6px;
}
#saving.show{display:flex}
#saving .spin-sm{width:14px;height:14px;border:2px solid rgba(200,24,26,.2);border-top-color:var(--brand);border-radius:50%;animation:spin .6s linear infinite;flex-shrink:0}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes bounce{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
</style>
</head>
<body>

<div id="loading">
  <div class="spin"></div>
  <div style="font-size:13px;color:rgba(255,255,255,.3)">Carregando cardápio...</div>
</div>

<div id="saving"><div class="spin-sm"></div> Enviando pedido...</div>

<div id="header" style="display:none">
  <div class="h-brand">
    <div class="h-logo-wrap">🔥</div>
    <div>
      <div class="h-name">Braseiro Artesanal</div>
      <div class="h-sub">🟢 Aberto · Rua Mara, 350 · Ariquemes/RO</div>
    </div>
    <div class="h-mesa">
      <span>Mesa</span>
      <span id="mesa-num">01</span>
    </div>
  </div>
  <div id="cats"></div>
</div>

<div id="screen" style="display:none"></div>

<div id="cart-bar" style="display:none">
  <div id="cart-empty">Nenhum item adicionado</div>
  <button id="cart-btn" onclick="openOrder()">
    <div class="cb-count" id="cb-count">0</div>
    <div class="cb-label">VER PEDIDO</div>
    <div class="cb-total" id="cb-total">R$ 0,00</div>
  </button>
</div>

<!-- VARIANTE OVERLAY -->
<div class="overlay" id="var-overlay" style="display:none" onclick="if(event.target===this)closeVariant()">
  <div class="sheet">
    <div class="handle"></div>
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
      <div id="var-emoji" style="font-size:42px"></div>
      <div>
        <div id="var-name" style="font-family:'Bebas Neue';font-size:20px;letter-spacing:.5px"></div>
        <div style="font-size:12px;color:var(--muted);margin-top:3px">Escolha o tamanho</div>
      </div>
    </div>
    <div id="var-opts"></div>
    <button id="var-confirm" onclick="confirmVariant()">ADICIONAR</button>
  </div>
</div>

<!-- PEDIDO OVERLAY -->
<div class="overlay" id="order-overlay" style="display:none" onclick="if(event.target===this)closeOrder()">
  <div class="sheet">
    <div class="handle"></div>
    <div class="sheet-title" id="order-title">SEU PEDIDO</div>
    <div id="order-items"></div>
    <div class="order-total-row">
      <span class="otl" id="order-count"></span>
      <span class="otv" id="order-total"></span>
    </div>
    <button class="btn-finalizar" onclick="finalizarPedido()">
      ✅ FINALIZAR PEDIDO
    </button>
    <button class="btn-back" onclick="closeOrder()">← Voltar ao cardápio</button>
  </div>
</div>

<!-- SUCCESS -->
<div id="success-overlay">
  <div class="s-icon">🔥</div>
  <div class="s-title">PEDIDO ENVIADO!</div>
  <div class="s-sub">Seu pedido chegou na cozinha.<br>Estamos preparando tudo!</div>
  <div class="s-num" id="s-num">#001</div>
  <div class="s-numlabel">Número do seu pedido</div>
  <button class="btn-voltar" onclick="resetPedido()">FAZER NOVO PEDIDO</button>
</div>

<script>
// ── CONFIG ─────────────────────────────────────────────────────────────────
const SUPABASE_URL = 'https://bbyfmbywmpylwkgnxneb.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJieWZtYnl3bXB5bHdrZ254bmViIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4MTM5MjUsImV4cCI6MjA5MjM4OTkyNX0.tqHQAie5AA-OARqpb4ASpM8uIWfz1TYFIkanN_uyYYs';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const params = new URLSearchParams(location.search);
const MESA = parseInt(params.get('mesa') || '1');
document.getElementById('mesa-num').textContent = String(MESA).padStart(2,'0');
document.getElementById('order-title').textContent = `SEU PEDIDO · MESA ${String(MESA).padStart(2,'0')}`;

// ── STATE ──────────────────────────────────────────────────────────────────
let CATS=[], PRODS=[], VARS=[], cart=[];
let varProduct=null, varSelected=null;
const secEls={};

const fmt = n => 'R$ '+n.toFixed(2).replace('.',',');
const key = (id,opt) => opt ? id+'_'+opt : String(id);

// ── LOAD ───────────────────────────────────────────────────────────────────
async function load(){
  const [cr,pr,vr] = await Promise.all([
    sb.from('categories').select('*').order('sort_order'),
    sb.from('products').select('*').eq('active',true).order('sort_order'),
    sb.from('variants').select('*')
  ]);
  CATS=cr.data||[]; PRODS=pr.data||[]; VARS=vr.data||[];
  render();
  document.getElementById('loading').style.display='none';
  document.getElementById('header').style.display='';
  document.getElementById('screen').style.display='';
  document.getElementById('cart-bar').style.display='';
}

// ── RENDER ─────────────────────────────────────────────────────────────────
function render(){
  const catsEl=document.getElementById('cats');
  catsEl.innerHTML='';
  CATS.forEach(c=>{
    const b=document.createElement('button');
    b.className='cat-btn'; b.dataset.id=c.id;
    b.textContent=c.icon+' '+c.name;
    b.onclick=()=>scrollToSec(c.id);
    catsEl.appendChild(b);
  });

  const screen=document.getElementById('screen');
  screen.innerHTML='';
  CATS.forEach(c=>{
    const items=PRODS.filter(p=>p.category_id===c.id);
    if(!items.length) return;
    const sec=document.createElement('div');
    sec.dataset.sec=c.id;
    const head=document.createElement('div');
    head.className='sec-head';
    head.innerHTML=`<div class="sec-head-line"></div><div class="sec-head-title">${c.icon} ${c.name.toUpperCase()}</div><div class="sec-head-line"></div>`;
    sec.appendChild(head);
    items.forEach(p=>{
      const vs=VARS.filter(v=>v.product_id===p.id);
      sec.appendChild(makeCard(p,vs));
    });
    screen.appendChild(sec);
    secEls[c.id]=sec;
  });
  if(CATS.length) setActiveCat(CATS[0].id);
  setupObserver();
  updateBar();
}

function makeCard(p,vs){
  const wrap=document.createElement('div');
  wrap.className='p-card'; wrap.id='card-'+p.id;
  wrap.innerHTML=`
    <div class="p-left">
      <div class="p-name">${p.name}</div>
      <div class="p-desc">${p.description||''}</div>
      <div class="p-bottom">
        <div class="p-price-wrap">
          <div class="p-price-label">A partir de</div>
          <div class="p-price"><small>R$</small>${p.price.toFixed(2).replace('.',',')}</div>
        </div>
        <div id="ctrl-${p.id}"></div>
      </div>
      <div class="var-tags" id="vtags-${p.id}" style="display:none"></div>
    </div>
    <div class="p-right">
      ${p.emoji}
      ${p.badge?`<div class="p-badge">${p.badge}</div>`:''}
      <div class="p-qty-chip" id="qchip-${p.id}">0</div>
    </div>`;
  renderCtrl(p,vs);
  return wrap;
}

function cartQty(pid){ return cart.filter(c=>c.productId===pid).reduce((s,c)=>s+c.qty,0); }

function renderCtrl(p,vs){
  if(!vs) vs=VARS.filter(v=>v.product_id===p.id);
  const ctrl=document.getElementById('ctrl-'+p.id);
  if(!ctrl) return;
  const total=cartQty(p.id);
  const hasOpts=vs.length>0;
  if(total===0||hasOpts){
    ctrl.innerHTML=`<button class="btn-add" onclick="handleAdd(${p.id})">${hasOpts?'✦ Escolher':'+ Adicionar'}</button>`;
  } else {
    ctrl.innerHTML=`<div class="qty-ctrl">
      <button class="qty-btn minus" onclick="removeItem(${p.id})">−</button>
      <span class="qty-num">${total}</span>
      <button class="qty-btn plus" onclick="handleAdd(${p.id})">+</button>
    </div>`;
  }
  const chip=document.getElementById('qchip-'+p.id);
  if(chip) chip.textContent=total;
  const card=document.getElementById('card-'+p.id);
  if(card) card.classList.toggle('in-cart',total>0);

  const tagsEl=document.getElementById('vtags-'+p.id);
  if(tagsEl&&hasOpts){
    const items=cart.filter(ci=>ci.productId===p.id);
    if(items.length){
      tagsEl.style.display='flex';
      tagsEl.innerHTML=items.map(ci=>`
        <div class="var-tag">
          <span>${ci.qty}× ${ci.optionLabel}</span>
          <button onclick="removeByKey('${ci.key}',${p.id})">✕</button>
        </div>`).join('');
    } else tagsEl.style.display='none';
  }
}

// ── CART ───────────────────────────────────────────────────────────────────
function handleAdd(pid){
  const p=PRODS.find(x=>x.id===pid);
  const vs=VARS.filter(v=>v.product_id===pid);
  if(vs.length){ openVariant(p,vs); return; }
  const k=key(pid,null);
  const idx=cart.findIndex(c=>c.key===k);
  if(idx>=0) cart[idx].qty++;
  else cart.push({key:k,productId:pid,optionLabel:null,price:p.price,qty:1});
  afterChange(pid);
}
function removeItem(pid){ removeByKey(key(pid,null),pid); }
function removeByKey(k,pid){
  const idx=cart.findIndex(c=>c.key===k);
  if(idx<0) return;
  if(cart[idx].qty>1) cart[idx].qty--;
  else cart.splice(idx,1);
  afterChange(pid);
}
function afterChange(pid){
  const p=PRODS.find(x=>x.id===pid);
  renderCtrl(p);
  updateBar();
}
function updateBar(){
  const total=cart.reduce((s,c)=>s+c.qty,0);
  const price=cart.reduce((s,c)=>s+c.price*c.qty,0);
  const btn=document.getElementById('cart-btn');
  document.getElementById('cb-count').textContent=total;
  document.getElementById('cb-total').textContent=fmt(price);
  btn.classList.toggle('visible',total>0);
  document.getElementById('cart-empty').style.display=total>0?'none':'block';
}

// ── VARIANTE ───────────────────────────────────────────────────────────────
function openVariant(p,vs){
  varProduct=p; varProduct._vs=vs; varSelected=null;
  document.getElementById('var-emoji').textContent=p.emoji;
  document.getElementById('var-name').textContent=p.name;
  document.getElementById('var-opts').innerHTML=vs.map(v=>`
    <button class="opt-btn" onclick="selOpt('${v.label}',${p.price+(v.extra_price||0)})">
      <div class="opt-left">
        <div class="radio"><div class="radio-dot"></div></div>
        <span class="opt-label">${v.label}</span>
      </div>
      <span class="opt-price">${fmt(p.price+(v.extra_price||0))}</span>
    </button>`).join('');
  const btn=document.getElementById('var-confirm');
  btn.disabled=true;
  btn.style.cssText='background:rgba(255,255,255,.07);color:rgba(255,255,255,.2);cursor:not-allowed';
  document.getElementById('var-overlay').style.display='flex';
}
function selOpt(label,price){
  varSelected={label,price};
  document.querySelectorAll('#var-opts .opt-btn').forEach(b=>{
    b.classList.toggle('sel',b.querySelector('.opt-label').textContent===label);
  });
  const btn=document.getElementById('var-confirm');
  btn.disabled=false;
  btn.style.cssText='background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;cursor:pointer;box-shadow:0 4px 16px rgba(200,24,26,.4)';
}
function closeVariant(){ document.getElementById('var-overlay').style.display='none'; }
function confirmVariant(){
  if(!varSelected||!varProduct) return;
  const k=key(varProduct.id,varSelected.label);
  const idx=cart.findIndex(c=>c.key===k);
  if(idx>=0) cart[idx].qty++;
  else cart.push({key:k,productId:varProduct.id,optionLabel:varSelected.label,price:varSelected.price,qty:1});
  afterChange(varProduct.id);
  closeVariant();
}

// ── ORDER SHEET ────────────────────────────────────────────────────────────
function openOrder(){
  const total=cart.reduce((s,c)=>s+c.price*c.qty,0);
  const count=cart.reduce((s,c)=>s+c.qty,0);
  document.getElementById('order-count').textContent=count+' '+(count===1?'item':'itens');
  document.getElementById('order-total').textContent=fmt(total);
  document.getElementById('order-items').innerHTML=cart.map(ci=>{
    const p=PRODS.find(x=>x.id===ci.productId);
    return `<div class="order-item">
      <div class="oi-emoji">${p.emoji}</div>
      <div>
        <div class="oi-name">${ci.qty}× ${p.name}</div>
        ${ci.optionLabel?`<div class="oi-var">${ci.optionLabel}</div>`:''}
        <div class="oi-price">${fmt(ci.price)} cada</div>
      </div>
      <div class="oi-right"><div class="oi-total">${fmt(ci.price*ci.qty)}</div></div>
    </div>`;
  }).join('');
  document.getElementById('order-overlay').style.display='flex';
}
function closeOrder(){ document.getElementById('order-overlay').style.display='none'; }

// ── FINALIZAR ──────────────────────────────────────────────────────────────
async function finalizarPedido(){
  const saving=document.getElementById('saving');
  saving.classList.add('show');
  closeOrder();

  const total=cart.reduce((s,c)=>s+c.price*c.qty,0);

  try {
    // 1. Salva pedido
    const {data:order,error:oErr}=await sb.from('orders')
      .insert({mesa:MESA,status:'new',total})
      .select().single();

    if(oErr) throw oErr;

    // 2. Salva itens
    const items=cart.map(ci=>{
      const p=PRODS.find(x=>x.id===ci.productId);
      return {order_id:order.id,product_id:ci.productId,product_name:p.name,variant_label:ci.optionLabel,qty:ci.qty,unit_price:ci.price};
    });
    await sb.from('order_items').insert(items);

    // 3. Sucesso
    saving.classList.remove('show');
    document.getElementById('s-num').textContent='#'+String(order.id).padStart(3,'0');
    document.getElementById('success-overlay').classList.add('show');
    cart=[];
    PRODS.forEach(p=>renderCtrl(p));
    updateBar();

  } catch(err){
    saving.classList.remove('show');
    console.error('Erro:', err);
    alert('Erro ao enviar pedido. Tente novamente.');
  }
}

function resetPedido(){
  document.getElementById('success-overlay').classList.remove('show');
}

// ── SCROLL / CATS ──────────────────────────────────────────────────────────
function scrollToSec(id){
  secEls[id]?.scrollIntoView({behavior:'smooth',block:'start'});
  setActiveCat(id);
}
function setActiveCat(id){
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.toggle('active',parseInt(b.dataset.id)===id));
}
function setupObserver(){
  const obs=new IntersectionObserver(entries=>{
    entries.forEach(e=>{if(e.isIntersecting)setActiveCat(parseInt(e.target.dataset.sec));});
  },{threshold:.3});
  Object.values(secEls).forEach(el=>obs.observe(el));
}

load();
</script>
